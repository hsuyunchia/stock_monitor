<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登入 - Stock Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { max-width: 400px; width: 100%; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="card auth-card border-0">
    <div class="card-body p-4 p-md-5">
        <h3 class="text-center mb-4 fw-bold" id="formTitle">👋 歡迎回來</h3>
        
        <div id="alertBox" class="alert d-none text-center p-2 mb-3" role="alert"></div>

        <form id="authForm">
            <div class="mb-3">
                <label class="form-label text-muted small">Email 信箱</label>
                <input type="email" name="email" class="form-control form-control-lg bg-light border-0" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label text-muted small">密碼</label>
                <input type="password" name="password" id="mainPassword" class="form-control form-control-lg bg-light border-0" placeholder="輸入密碼" required>
            </div>

            <div class="mb-4" id="confirmPasswordGroup" style="display: none;">
                <label class="form-label text-muted small">確認密碼</label>
                <input type="password" id="confirmPassword" class="form-control form-control-lg bg-light border-0" placeholder="再次輸入密碼">
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg w-100 mb-3" id="submitBtn">登入</button>
        </form>

        <div class="text-center">
            <a href="#" id="toggleBtn" class="text-decoration-none text-muted small">還沒有帳號嗎？點此註冊</a>
        </div>
    </div>
</div>

<script>
    let isLogin = true;
    const form = document.getElementById('authForm');
    const title = document.getElementById('formTitle');
    const submitBtn = document.getElementById('submitBtn');
    const toggleBtn = document.getElementById('toggleBtn');
    const alertBox = document.getElementById('alertBox');

    // 切換登入與註冊模式
    toggleBtn.addEventListener('click', (e) => {
        e.preventDefault();
        isLogin = !isLogin;
        
        const confirmGroup = document.getElementById('confirmPasswordGroup');
        const confirmInput = document.getElementById('confirmPassword');

        if (isLogin) {
            title.textContent = '👋 歡迎回來';
            submitBtn.textContent = '登入';
            // 💡 修正 2：把 toggleText 改回正確的 toggleBtn
            toggleBtn.textContent = '還沒有帳號嗎？點此註冊';
            
            confirmGroup.style.display = 'none';
            confirmInput.removeAttribute('required');
        } else {
            title.textContent = '✨ 建立新帳號';
            submitBtn.textContent = '註冊';
            toggleBtn.textContent = '已經有帳號了？點此登入';
            
            confirmGroup.style.display = 'block';
            confirmInput.setAttribute('required', 'required');
        }
        
        alertBox.classList.add('d-none');
    });

    // 處理表單送出
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        if (!isLogin) {
            const pwd = document.getElementById('mainPassword').value;
            const cpwd = document.getElementById('confirmPassword').value;
            if (pwd !== cpwd) {
                alertBox.textContent = "兩次輸入的密碼不一致！";
                alertBox.className = 'alert alert-danger text-center p-2 mb-3';
                alertBox.classList.remove('d-none');
                return; 
            }
        }

        const formData = new FormData(form);
        const endpoint = isLogin ? '/auth/login' : '/auth/register';
        
        try {
            const response = await fetch(endpoint, { 
                method: 'POST', 
                body: formData,
                credentials: 'include' 
            });
            
            const result = await response.json();
            
            if (response.ok) {
                alertBox.textContent = isLogin ? "登入成功！導向中..." : "註冊成功！自動登入中...";
                alertBox.className = 'alert alert-success text-center p-2 mb-3';
                alertBox.classList.remove('d-none');
                
                setTimeout(() => {
                    window.location.replace("/");
                }, 800);
            } else {
                alertBox.textContent = result.message || "發生錯誤，請檢查帳號密碼。";
                alertBox.className = 'alert alert-danger text-center p-2 mb-3';
                alertBox.classList.remove('d-none');
            }
        } catch (error) {
            alertBox.textContent = "系統連線異常，請稍後再試。";
            alertBox.className = 'alert alert-danger text-center p-2 mb-3';
            alertBox.classList.remove('d-none');
        }
    });
</script>
</body>
</html>
