<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登入 - Stock Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { max-width: 400px; width: 100%; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="card auth-card border-0">
    <div class="card-body p-4 p-md-5">
        <h3 class="text-center mb-4 fw-bold" id="formTitle">👋 歡迎回來</h3>
        
        <div id="alertBox" class="alert d-none text-center p-2 mb-3" role="alert"></div>

        <form id="authForm">
            <div class="mb-3">
                <label class="form-label text-muted small">Email 信箱</label>
                <input type="email" name="email" class="form-control form-control-lg bg-light border-0" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted small">密碼</label>
                <input type="password" name="password" class="form-control form-control-lg bg-light border-0" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 mb-3" id="submitBtn">登入</button>
        </form>

        <div class="text-center">
            <a href="#" id="toggleBtn" class="text-decoration-none text-muted small">還沒有帳號嗎？點此註冊</a>
        </div>
    </div>
</div>

<script>
    let isLogin = true;
    const form = document.getElementById('authForm');
    const title = document.getElementById('formTitle');
    const submitBtn = document.getElementById('submitBtn');
    const toggleBtn = document.getElementById('toggleBtn');
    const alertBox = document.getElementById('alertBox');

    // 切換登入與註冊模式
    toggleBtn.addEventListener('click', (e) => {
        e.preventDefault();
        isLogin = !isLogin;
        title.innerHTML = isLogin ? "👋 歡迎回來" : "🚀 建立新帳號";
        submitBtn.innerHTML = isLogin ? "登入" : "註冊";
        toggleBtn.innerHTML = isLogin ? "還沒有帳號嗎？點此註冊" : "已經有帳號了？點此登入";
        alertBox.classList.add('d-none');
    });

    // 處理表單送出
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(form);
        const endpoint = isLogin ? '/auth/login' : '/auth/register';
        
        try {
            const response = await fetch(endpoint, { 
                method: 'POST', 
                body: formData,
                // 💡 確保請求會包含憑證資訊 (雖然同源時預設就是包含)
                credentials: 'include' 
            });
            
            const result = await response.json();
            
            if (response.ok) {
                // ... (alert 邏輯)
                setTimeout(() => {
                    // 💡 使用 replace 避免歷史紀錄權限問題
                    window.location.replace("/"); 
                }, 800);
            } else {
                // ... (錯誤邏輯)
            }
        } catch (error) {
            console.error("Fetch 發生錯誤:", error);
            alertBox.textContent = "系統連線異常，請查看 Console 報錯。";
        }
    });
</script>
</body>
</html>
